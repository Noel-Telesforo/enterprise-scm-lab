name: CD - Staging

on:
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: http://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkoyut@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Docker image
        run: docker build -t enterprise-scm-lab:staging .

      - name: Simulate deployment to Staging
        run: |
          echo "Deploying to STAGING environment..."
          echo "Application deployed successfully"
          echo "Available at: http://staging.example.com"
name: CD - Development

on:
  push:
    branches: [feature/*]

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      # Simula la url local
      url: http://localhost:3000

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Seupt Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build Doceker image
        run: docker build -t enterprise-scm-lab:dev .

      - name: Simulate deployment to Dev
        run: |
          echo "Deploying to DEV environment..."
          echo "Application deployed successfully"
          echo "Available at http://localhost:3000"
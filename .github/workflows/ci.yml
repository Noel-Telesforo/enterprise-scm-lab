# Nombre del workflow
name: CI Pipeline

# Eventos que disparan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Control de concurrencia (cancelar ejecuciones anteriores en el mismo PR)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Permisos mínimos (principio de menor privilegio)
permissions:
  contents: read

# Jobs definidos en el workflow
jobs:
  # job 1: Tests en múltiples versiones de Node
  test:
    name: Test on Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    # Estrategia de matriz
    strategy:
      # Si una versión falla, las demás siguen ejecutándose
      fail-fast: false
      # Lista de versiones a probar
      matrix:
        node-version: [18, 20, 22, 26]

    steps:
      # 1. Descargar el código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurar Node.js con caché automático
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Caché guarda .npm para no reinstalar todo
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Ejecutar tests
      - name: Run tests
        run: npm test

  # Job 2: Construye docker, solo despues de que los test pasen
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    # Este job es para que este test termine exitosamente
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t enterprise-scm-lab:${{github.sha }} .
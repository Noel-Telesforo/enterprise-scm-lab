# Nombre del workflow
name: CI Pipeline

# Eventos que disparan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Control de concurrencia (cancelar ejecuciones anteriores en el mismo PR)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Permisos mínimos (principio de menor privilegio)
permissions:
  contents: read

# Jobs definidos en el workflow
jobs:
  # Este job llama al reusable workflow
  call-build:
    name: Call Reusable Build
    # Usa el reusable workflow
    uses: ./.github/workflows/reusable-build.yml
    # Pasa los inputs personalizados
    with:
      node-version: '20'
      run-tests: true
    # Pasa secrets si los hubiera
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN || '' }}
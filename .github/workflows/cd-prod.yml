name: CD - Production

on:
  push:
    branches: [main]

permissions:
  contents: read
  # Necesita permisos para usar environments con aprobación
  id-token: write
  deployments: write

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: prosuction
      url: https://enterprise-scm-lab.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run test
        run: npm test

      - name: Buil Docker image
        run: docker build -t enterprise-scm-lab:latest .

      - name: Simulate deployment to Production
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "Application deployed successfully"
          echo "Available at: https://enterprise-scm-lam.com"